name: Update Plugin Repository
run-name: Update Plugin Repository ${{ inputs.correlation_id || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: Optional release orchestration correlation id
        required: false
        type: string
  schedule:
    - cron: '17 18 * * *'

permissions:
  contents: write

concurrency:
  group: plugin-repository-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build repository metadata
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .\tools\Build-MasterRepo.ps1

      - name: Test repository metadata
        shell: powershell
        run: .\tools\tests\MasterRepo.Tests.ps1

      - name: Commit changes
        shell: powershell
        run: |
          git config user.name "bloooowfish"
          git config user.email "285025450+bloooowfish@users.noreply.github.com"
          $changes = git status --short
          if ($changes) {
            git add repo.json
            git commit -m "chore: update plugin repository"
            git push
          }
